<!DOCTYPE html>
<html lang="zh-CN" data-theme="amber">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OfficeAI 助手</title>
<link rel="stylesheet" href="/static/style.css?v=5">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
</head>
<body>
<button id="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
<div id="app">
  <aside id="sidebar">
    <div id="sidebar-header">
      <h2>OfficeAI</h2>
      <button id="settings-btn" title="设置">⚙️</button>
    </div>
    <button id="new-chat-btn">+ 新对话</button>
    <nav id="tool-nav">
      <div class="nav-label">功能</div>
      <button class="tool-btn active" data-tool="">💬 自由对话</button>
      <button class="tool-btn" data-tool="doc_summary">📄 文档总结</button>
      <button class="tool-btn" data-tool="doc_generate">📝 文案生成</button>
      <button class="tool-btn" data-tool="web_search">🔍 联网检索</button>
    </nav>
    <div id="template-cards"></div>
    <div id="file-upload-area">
      <div class="nav-label">文件上传</div>
      <input type="file" id="file-input" accept=".txt,.docx,.md,.pdf" hidden>
      <button id="upload-btn">📎 选择文件</button>
      <div id="file-status"></div>
    </div>
  </aside>
  <main id="chat-container">
    <div id="messages"></div>
    <div id="tpl-info"></div>
    <div id="status-bar"></div>
    <div id="input-area">
      <textarea id="user-input" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" rows="2"></textarea>
      <button id="send-btn">发送</button>
    </div>
  </main>
</div>

<!-- Settings Modal -->
<div id="settings-overlay">
  <div id="settings-modal">
    <h3>⚙️ 设置</h3>
    <div class="settings-section">
      <h4>API 配置</h4>
      <div class="setting-row">
        <label>Base URL</label>
        <input id="cfg-base" placeholder="https://api.deepseek.com">
      </div>
      <div class="setting-row">
        <label>API Key</label>
        <input id="cfg-key" type="password" placeholder="sk-...">
      </div>
      <div class="setting-row">
        <label>模型</label>
        <input id="cfg-model" placeholder="deepseek-chat">
      </div>
    </div>
    <div class="settings-section">
      <h4>界面主题</h4>
      <div id="theme-picker">
        <div class="theme-dot" data-theme="amber" style="background:linear-gradient(135deg,#c9953c,#1b1b1b)" title="琥珀金"></div>
        <div class="theme-dot" data-theme="dark" style="background:linear-gradient(135deg,#fff,#0d0d0d)" title="极致暗黑"></div>
        <div class="theme-dot" data-theme="light" style="background:linear-gradient(135deg,#1a1a1a,#fafaf8)" title="纯白"></div>
        <div class="theme-dot" data-theme="forest" style="background:linear-gradient(135deg,#7cb885,#1a1f1c)" title="松木绿"></div>
        <div class="theme-dot" data-theme="ocean" style="background:linear-gradient(135deg,#7aaccc,#191d24)" title="深海蓝"></div>
      </div>
    </div>
    <div id="settings-actions">
      <button id="settings-close">取消</button>
      <button id="settings-save">保存设置</button>
    </div>
  </div>
</div>

<script src="/static/app.js?v=5"></script>
</body>
</html>
